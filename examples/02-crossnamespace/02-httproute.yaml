---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: echo
  namespace: user01
spec:
  parentRefs:
  - name: gateway
    namespace: gateway-ns
  hostnames: ["user01.example.com"]
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: echo
      port: 3000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: echo-app
  namespace: user01
spec:
  parentRefs:
  - name: gateway
    namespace: gateway-ns
    sectionName: https-user01
  hostnames: ["app.user01.com"]
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /myapp
    backendRefs:
    - name: echo
      port: 3000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: echo-app-user2
  namespace: user01
spec:
  parentRefs:
  - name: gateway
    namespace: gateway-ns
    sectionName: https-user01
  hostnames: ["appuser2.user01.com"]
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /myapp
    backendRefs:
    - name: echo
      namespace: user02
      port: 3000